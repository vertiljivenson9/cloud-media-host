name = "cloud-media-host"
main = "src/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare KV - Base de datos de archivos
# Cuando conectes el repo a Cloudflare, crea el KV namespace primero
# y reemplaza el ID abajo, o usa la variable de entorno KV_MEDIA_KV_ID
[[kv_namespaces]]
binding = "MEDIA_KV"
id = "${KV_MEDIA_KV_ID}"

# Variables de entorno
[vars]
ENVIRONMENT = "production"
MAX_FILE_SIZE = "104857600"
